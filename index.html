<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudShield | Code Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00a2ff; --bg: #05070a; --card-bg: rgba(15, 20, 28, 0.85); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; color: white; }
        #particles-js { position: absolute; width: 100%; height: 100%; z-index: 0; }
        .verify-card {
            position: relative; z-index: 1; background: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 50px 40px; border-radius: 32px;
            text-align: center; width: 90%; max-width: 440px; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }
        .icon-container {
            width: 90px; height: 90px; background: rgba(0, 162, 255, 0.1); border-radius: 24px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 30px;
            border: 1px solid rgba(0, 162, 255, 0.3);
        }
        .icon-container i { font-size: 40px; color: var(--primary); }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; letter-spacing: -1px; }
        p { color: #94a3b8; font-size: 16px; margin-bottom: 30px; line-height: 1.6; }
        
        .btn-main {
            width: 100%; background: var(--primary); color: white; border: none; padding: 20px;
            font-size: 18px; font-weight: 700; border-radius: 18px; cursor: pointer;
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 162, 255, 0.4); }
        
        /* Onde o código vai aparecer */
        #codeResult { display: none; margin-top: 20px; }
        .secret-code {
            font-size: 36px; font-weight: 800; letter-spacing: 5px; color: #fff;
            background: rgba(0, 162, 255, 0.2); padding: 15px 30px; border-radius: 12px;
            border: 2px dashed #00a2ff; margin-bottom: 15px; display: inline-block;
        }
        
        .spinner { display: none; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .spinner { display: block; }
        .loading .btn-content { display: none; }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="verify-card">
        <div class="icon-container"><i class="fa-solid fa-shield-halved"></i></div>
        <h1>Human Verification</h1>
        <p id="descText">Click the button below to generate your unique access code.</p>
        
        <button class="btn-main" id="verifyBtn">
            <div class="btn-content"><i class="fa-solid fa-fingerprint"></i> <span>Generate Code</span></div>
            <div class="spinner"></div>
        </button>

        <div id="codeResult">
            <p style="color: #00a2ff; font-weight: 600;">Your Access Code:</p>
            <div class="secret-code" id="displayCode">----</div>
            <p style="font-size: 14px;">Return to the bot and send this code to get access.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {"particles":{"number":{"value":80},"color":{"value":"#00a2ff"},"shape":{"type":"circle"},"opacity":{"value":0.2},"size":{"value":3},"line_linked":{"enable":true,"distance":150,"color":"#00a2ff","opacity":0.1,"width":1}}});
        
        // Puxa o código do link (ex: site.com/?code=1234)
        const urlParams = new URLSearchParams(window.location.search);
        const secretCode = urlParams.get('code') || "ERRO";

        const btn = document.getElementById('verifyBtn');
        const resultDiv = document.getElementById('codeResult');
        const displayCode = document.getElementById('displayCode');
        const descText = document.getElementById('descText');

        btn.addEventListener('click', () => {
            btn.classList.add('loading');
            btn.disabled = true;
            
            setTimeout(() => {
                btn.style.display = 'none'; // Esconde o botão
                descText.style.display = 'none'; // Esconde o texto inicial
                displayCode.innerText = secretCode; // Mostra o código do bot
                resultDiv.style.display = 'block'; // Revela a área do código
            }, 600); // Roda durante 0.6s
        });
    </script>
</body>
</html>
