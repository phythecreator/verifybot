<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Check | verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .shield-icon {
            font-size: 60px;
            color: #0088cc;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px rgba(0, 136, 204, 0.4));
        }

        h1 { font-size: 26px; margin-bottom: 12px; }
        p { color: #888; font-size: 15px; margin-bottom: 35px; line-height: 1.6; }

        .btn-verify {
            width: 100%;
            background: #0088cc;
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-verify:hover {
            background: #00a2f3;
            transform: scale(1.02);
        }

        .loader {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading .loader { display: block; }
        .loading .btn-text, .loading i { display: none; }
    </style>
</head>
<body>
    <div class="glass-card">
        <i class="fas fa-user-shield shield-icon"></i>
        <h1>Verification Required</h1>
        <p>To access the group, we need to ensure you are a human user. Click below to verify.</p>
        
        <button class="btn-verify" id="verifyBtn">
            <i class="fas fa-check-circle"></i>
            <span class="btn-text">Verify Account</span>
            <div class="loader"></div>
        </button>
    </div>

    <script>
        const btn = document.getElementById('verifyBtn');
        // ATENÇÃO: Substitui 'TEU_BOT_USERNAME' pelo username do teu bot sem o @
        const botUsername = "TEU_BOT_USERNAME"; 

        btn.addEventListener('click', () => {
            btn.classList.add('loading');
            btn.disabled = true;

            setTimeout(() => {
                window.location.href = `https://t.me/${botUsername}?start=success`;
            }, 600);
        });
    </script>
</body>
</html>
