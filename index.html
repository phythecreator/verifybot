<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudShield | Secure Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00a2ff; --bg: #05070a; --card-bg: rgba(15, 20, 28, 0.9); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; color: white; }
        #particles-js { position: absolute; width: 100%; height: 100%; z-index: 0; }
        .verify-card {
            position: relative; z-index: 1; background: var(--card-bg); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 50px 40px; border-radius: 32px;
            text-align: center; width: 95%; max-width: 420px; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }
        .icon-container {
            width: 80px; height: 80px; background: rgba(0, 162, 255, 0.1); border-radius: 22px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 25px;
            border: 1px solid rgba(0, 162, 255, 0.3); color: var(--primary); font-size: 35px;
        }
        h1 { font-size: 26px; font-weight: 800; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 15px; margin-bottom: 30px; line-height: 1.5; }
        .btn-main {
            width: 100%; background: var(--primary); color: white; border: none; padding: 18px;
            font-size: 17px; font-weight: 700; border-radius: 15px; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 162, 255, 0.3); }
        #resultArea { display: none; margin-top: 20px; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .code-display {
            font-size: 42px; font-weight: 800; color: #fff; background: rgba(255,255,255,0.05);
            padding: 15px; border-radius: 12px; border: 2px dashed var(--primary); margin: 15px 0; letter-spacing: 4px;
        }
        .spinner { display: none; width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .spinner { display: block; }
        .loading .btn-content { display: none; }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="verify-card">
        <div class="icon-container"><i class="fa-solid fa-user-check"></i></div>
        <div id="step1">
            <h1>Identity Check</h1>
            <p>Click the button to reveal your secure access code.</p>
            <button class="btn-main" id="verifyBtn">
                <div class="btn-content">Verify Now</div>
                <div class="spinner"></div>
            </button>
        </div>
        <div id="resultArea">
            <p style="color: var(--primary); font-weight: 600;">YOUR CODE:</p>
            <div class="code-display" id="codeOut">----</div>
            <p style="font-size: 13px;">Copy this code and send it back to the Telegram Bot.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {"particles":{"number":{"value":60},"color":{"value":"#00a2ff"},"opacity":{"value":0.2},"size":{"value":2},"line_linked":{"enable":true,"distance":150,"color":"#00a2ff","opacity":0.1}}});
        
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code') || "NONE";

        document.getElementById('verifyBtn').addEventListener('click', function() {
            this.parentElement.classList.add('loading');
            setTimeout(() => {
                document.getElementById('step1').style.display = 'none';
                document.getElementById('resultArea').style.display = 'block';
                document.getElementById('codeOut').innerText = code;
            }, 600);
        });
    </script>
</body>
</html>
