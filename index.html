<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Check | CloudVerify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Efeito de fundo animado */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #0088cc;
            filter: blur(120px);
            border-radius: 50%;
            opacity: 0.2;
            z-index: 0;
            animation: move 10s infinite alternate;
        }

        @keyframes move { from { transform: translate(-50%, -50%); } to { transform: translate(50%, 50%); } }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            z-index: 1;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(0, 136, 204, 0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: #0088cc;
            font-size: 32px;
        }

        h1 { font-size: 24px; margin-bottom: 10px; font-weight: 700; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }

        .btn-verify {
            width: 100%;
            background: #0088cc;
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-verify:hover {
            background: #00a2f3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.3);
        }

        .btn-verify:active { transform: translateY(0); }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading .loader { display: block; }
        .loading .btn-text, .loading i { display: none; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="card">
        <div class="icon-box">
            <i class="fas fa-shield-halved"></i>
        </div>
        <h1>Portal de Segurança</h1>
        <p>Para manter a nossa comunidade segura, precisamos de confirmar que és um utilizador real.</p>
        
        <button class="btn-verify" id="mainBtn">
            <i class="fas fa-user-check"></i>
            <span class="btn-text">Verify Account</span>
            <div class="loader"></div>
        </button>
    </div>

    <script>
        const btn = document.getElementById('mainBtn');
        // Altera aqui para o username do teu bot (sem o @)
        const botUsername = "TeuBotUsername"; 

        btn.addEventListener('click', () => {
            btn.classList.add('loading');
            btn.disabled = true;

            setTimeout(() => {
                window.location.href = `https://t.me/${botUsername}?start=verify_success`;
            }, 600);
        });
    </script>
</body>
</html>
