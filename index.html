<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudShield | Verify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: rgba(15, 20, 28, 0.9); padding: 40px; border-radius: 25px; border: 1px solid #00a2ff; width: 90%; max-width: 350px; }
        .pass-box { font-size: 32px; font-weight: bold; color: #00a2ff; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin: 20px 0; display: none; border: 1px dashed #00a2ff; }
        button { background: #00a2ff; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <i class="fa-solid fa-shield-halved" style="font-size: 50px; color: #00a2ff;"></i>
        <h2>Human Check</h2>
        <p>Click below to see your access password.</p>
        <button id="showBtn">REVEAL PASSWORD</button>
        <div id="passBox" class="pass-box"></div>
        <p style="font-size: 12px; color: #666; margin-top: 15px;">Copy this word and send it to the bot.</p>
    </div>

    <script>
        const passwords = ["SKY42", "BOLT9", "FIRE1", "WIND7", "ICE00"];
        const randomPass = passwords[Math.floor(Math.random() * passwords.length)];
        
        document.getElementById('showBtn').addEventListener('click', function() {
            this.style.display = 'none';
            const box = document.getElementById('passBox');
            box.innerText = randomPass;
            box.style.display = 'block';
        });
    </script>
</body>
</html>
